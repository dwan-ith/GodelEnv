environment_name: GodelEnv
version: 0.4.0
description: >
  A recursive self-improvement environment where an LLM proposes StrategyPatch
  mutations to its own reasoning policy. Patches are evaluated on episode-hidden
  downstream task bundles, gated by a Governor, and served through a hybrid
  LLM-first runtime with deterministic fallback.
author: litterarum
license: MIT

actions:
  schema:
    type: object
    required: [solution]
    properties:
      solution:
        type: string
        description: Full replacement solution submitted by the agent.
      edit_type:
        type: string
        enum: [rewrite, add_reasoning, simplify, add_examples, fix_errors, restructure, synthesize, refine]
        default: rewrite
      strategy_note:
        type: string
        description: Optional note explaining the edit.
      strategy_patch:
        type: object
        description: Optional recursive self-improvement patch evaluated on held-out downstream tasks.
        properties:
          improved_strategy: { type: string }
          diff_description: { type: string }
          hypothesis: { type: string }
          target_weaknesses: { type: array, items: { type: string } }

observations:
  schema:
    type: object
    properties:
      episode_id: { type: string }
      task_id: { type: string }
      task_type: { type: string }
      difficulty: { type: string, enum: [easy, medium, hard, godel] }
      task_prompt: { type: string }
      current_solution: { type: string }
      total_score: { type: number, minimum: 0.001, maximum: 0.999 }
      rubric_scores:
        type: object
        properties:
          scores: { type: object, additionalProperties: { type: number } }
          weights: { type: object, additionalProperties: { type: number } }
          feedback: { type: object, additionalProperties: { type: string } }
      step: { type: integer }
      max_steps: { type: integer, default: 10 }
      improvement_history: { type: array, items: { type: number } }
      feedback_summary: { type: string }
      grading_source: { type: string }
      grading_error: { type: string }
      current_strategy: { type: string }
      strategy_id: { type: string }
      strategy_generation: { type: integer }
      strategy_elo: { type: number }
      recent_failures: { type: array, items: { type: string } }
      downstream_scores: { type: object, additionalProperties: { type: number } }
      patch_history: { type: array, items: { type: object } }
      budget_remaining: { type: integer }

reward:
  description: >
    Multi-channel reward suitable for GRPO or other verifier-based RL pipelines.
  channels:
    task_score_delta:
      description: Score improvement from previous step.
      range: [-1.0, 1.0]
    format_compliance:
      description: Bonus for following the expected output structure.
      range: [0.0, 0.02]
    step_cost:
      description: Per-step penalty that favors shorter successful trajectories.
      value: -0.005
    anti_hack_penalty:
      description: Penalty from anti-reward-hacking guards.
      range: [-1.0, 0.0]
    process_reward:
      description: Small bonus for structurally useful edits that improve the draft.
      range: [0.0, 0.05]
    patch_quality:
      description: Reward for accepted strategy patches; penalty for rejected patches.
      range: [-0.05, 1.0]
    generalization_score:
      description: Bonus from weakest held-out task-family performance.
      range: [0.0, 0.1]
    robustness_score:
      description: Bonus for narrow gap between mean and weakest held-out score.
      range: [0.0, 0.05]
    stability_score:
      description: Bonus for low variance across held-out task families.
      range: [0.0, 0.05]
  total: "Sum of all channels"
  termination:
    - "accepted_patch: Governor accepts a StrategyPatch into the registry"
    - "plateau: last 3 deltas all < 0.005"
    - "guard_violation: severe anti-hacking penalty (<= -0.8)"
    - "max_steps: step >= 10 (truncation)"

guards:
  description: >
    Fast deterministic checks that penalize answer-level abuse and strategy-level
    reward hacking. Strategy patches are rejected for evaluator leakage, canary
    violations, broad regressions, excessive variance, and padding.
  checks:
    - name: empty_solution
      penalty: -0.5
    - name: length_guard
      penalty: -0.3
    - name: repetition_guard
      penalty: -0.4
    - name: forbidden_pattern
      penalty: -0.5
      applies_to: [code_improvement, python_optimized]
    - name: regression_guard
      penalty: -0.2
    - name: canary_guard
      penalty: -0.5
      applies_to: [strategy_patch]
    - name: strategy_regression_gate
      penalty: -0.3
      applies_to: [strategy_patch]
    - name: strategy_variance_penalty
      penalty: -0.2
      applies_to: [strategy_patch]
    - name: strategy_length_guard
      penalty: [-0.3, -0.2]
      applies_to: [strategy_patch]

curriculum:
  difficulty_ladder: [easy, medium, hard, godel]
  window_size: 10
  escalation_threshold: 0.6
  deescalation_threshold: 0.2
  success_score_threshold: 0.7

tasks:
  - id: factual_qa
    difficulty: easy
    description: Expand a weak factual explanation into a complete answer.
  - id: alignment_qa
    difficulty: easy
    description: Explain alignment concepts with nuance and technical accuracy.
  - id: code_improvement
    difficulty: medium
    description: Repair Python code so it passes isolated tests and adds documentation.
  - id: python_optimized
    difficulty: medium
    description: Optimize a Python function while preserving correctness.
  - id: reasoning
    difficulty: medium
    description: Produce a balanced trade-off analysis with an explicit recommendation.
  - id: adr_writing
    difficulty: hard
    description: Expand sparse architecture notes into a structured ADR.
  - id: strategy_optimization
    difficulty: godel
    description: Improve a reasoning strategy and demonstrate it on a downstream task.

run:
  timeout_seconds: 120
  async_supported: true
  max_steps: 10

training:
  framework: trl
  algorithm: GRPO
  script: train.py
  notebook: train_colab.ipynb
  default_modes:
    grading: deterministic
    strategy_eval: deterministic

inference:
  default_mode: hybrid
  llm_first_with_fallback: true
  hybrid_smoke_script: hybrid_smoke.py
  default_env_modes:
    grading: GODEL_GRADING_MODE=auto
    strategy_eval: GODEL_STRATEGY_EVAL_MODE=auto
    provider_order: GODEL_PROVIDER_ORDER=huggingface,custom,openai
  openai:
    enabled_by_env:
      - OPENAI_API_KEY
    base_url_env: OPENAI_API_BASE_URL
    model_env: OPENAI_MODEL_NAME
    fallback_model_env: MODEL_NAME
  custom_openai_compatible:
    enabled_by_env:
      - API_KEY
      - API_BASE_URL
    base_url_env: API_BASE_URL
    model_env: CUSTOM_MODEL_NAME
    fallback_model_env: MODEL_NAME
  huggingface_router:
    enabled_by_env:
      - HF_TOKEN
      - HF_API_KEY
      - HUGGINGFACE_API_KEY
      - HUGGINGFACE_TOKEN
      - HUGGINGFACEHUB_API_TOKEN
      - HUGGING_FACE_HUB_TOKEN
      - HF_ACCESS_TOKEN
    base_url_env: HF_API_BASE_URL
    recommended_base_url: https://router.huggingface.co/v1
    token_env: HF_TOKEN
    model_env: HF_MODEL_NAME
    fallback_model_env: MODEL_NAME
    recommended_model: Qwen/Qwen2.5-7B-Instruct

api:
  reset: { method: POST, path: /reset, body: "{ task_type?, difficulty?, task_id? }" }
  step: { method: POST, path: /step, body: "{ action: GodelAction }" }
  state: { method: GET, path: /state, returns: GodelState }
  websocket: { method: WS, path: /ws, description: "Persistent session API for multi-step episodes." }
  demo_act: { method: POST, path: /demo/act, body: "{ task_prompt, current_solution, task_type, current_strategy?, recent_failures?, downstream_scores? }" }
  demo_provider_status: { method: GET, path: /demo/provider-status, description: "Non-secret hybrid provider diagnostics for debugging auto mode." }
